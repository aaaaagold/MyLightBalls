<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

	<link rel="icon" href="icon/icon.png" type="image/png">
	<link rel="apple-touch-icon" href="icon/icon.png">
	<title>我ㄉ光球ㄉㄉㄉ</title>
<style>
body{
overflow:hidden;
}
#root-iframe{
position:fixed;
left:0px; top:0px;
width:100%; height:100%;
margin: 0px;
border: 0px solid black;
padding: 0px;
}
</style>
</head>
<body style="background-color: black">
<iframe src="inner.html#entry=MyLightBalls" id="root-iframe"></iframe>
<script>
"use strict";
const focusOnTheGame=function f(){
	const ele=document.getElementById("root-iframe");
	if(ele){ const cw=ele.contentWindow; if(cw){
		cw.focus();
		return;
	} }
	const th=1e2;
	if(isNaN(f._lastDateNow)) f._lastDateNow=-th;
	if(isNaN(f._lastPerformance)) f._lastPerformance=-th;
	const dt=Math.min(Date.now()-f._lastDateNow,performance.now()-f._lastPerformance)||0;
	if(!(dt>=0)||dt>=th){
		f._lastDateNow=Date.now();
		f._lastPerformance=performance.now();
		console.warn("cannot find game iframe");
	}
};
window.onfocus=focusOnTheGame;
const focusOnTheGameLoop1=function f(){
focusOnTheGame();
requestAnimationFrame(f);
};
focusOnTheGameLoop1();
</script>
</body>
</html>
